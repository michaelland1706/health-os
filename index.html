<title>Health OS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#0c0c0b; --s1:#151514; --s2:#1e1e1c;
  --b1:#272725; --b2:#323230;
  --t1:#ece9e0; --t2:#7a7870; --t3:#3a3a38;
  --green:#b8e04a; --amber:#e0a84a; --red:#e05a4a;
  --gdim:rgba(184,224,74,0.1);
}
html { height: 100%; }
body {
  height: 100vh;
  height: 100dvh;
  background: var(--bg);
  color: var(--t1);
  font-family: "IBM Plex Sans", sans-serif;
  font-size: 15px;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  overflow: hidden;
}
/* HEADER */
.hdr {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--b1);
  background: var(--bg);
}
.logo {
  font-family: "Instrument Serif", serif;
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.hdr-right { display:flex; gap:8px; align-items:center; }
.wbadge {
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  color: var(--green);
  background: var(--gdim);
  border: 1px solid rgba(184,224,74,.25);
  padding: 3px 10px;
  border-radius: 20px;
}
.sbtn {
  width: 36px; height: 36px;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 8px;
  color: var(--t2);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
/* QUICK BAR */
.qbar {
  flex-shrink: 0;
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  overflow-x: auto;
  border-bottom: 1px solid var(--b1);
  background: var(--s1);
  scrollbar-width: none;
}
.qbar::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink: 0;
  padding: 6px 12px;
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: 20px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  color: var(--t2);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.chip:active { color:var(--green); border-color:var(--green); background:var(--gdim); }
/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}
.daysep {
  display: flex; align-items: center; gap: 8px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1px;
}
.daysep::before,.daysep::after { content:""; flex:1; height:1px; background:var(--b1); }
.msg { display:flex; flex-direction:column; max-width:88%; }
.msg.u { align-self:flex-end; align-items:flex-end; }
.msg.a { align-self:flex-start; align-items:flex-start; }
.bubble {
  padding: 10px 13px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
}
.msg.u .bubble { background:var(--s2); border:1px solid var(--b2); border-bottom-right-radius:4px; }
.msg.a .bubble { background:var(--s1); border:1px solid var(--b1); border-bottom-left-radius:4px; }
.ts { font-family:"IBM Plex Mono",monospace; font-size:9px; color:var(--t3); margin-top:3px; padding:0 2px; }
.bubble strong { font-weight:600; }
.bubble em { color:var(--t2); font-style:italic; }
.bubble h3 { font-size:13px; font-weight:500; font-family:"IBM Plex Mono",monospace; margin:8px 0 4px; }
.bubble ul { padding-left:16px; margin:6px 0; }
.bubble li { margin:3px 0; font-size:13px; }
.bubble p { margin:4px 0; }
.bubble p:first-child { margin-top:0; }
.bubble p:last-child { margin-bottom:0; }
.bubble hr { border:none; border-top:1px solid var(--b1); margin:8px 0; }
/* TYPING */
.typing { display:flex; gap:4px; align-items:center; padding:14px; background:var(--s1); border:1px solid var(--b1); border-radius:14px; border-bottom-left-radius:4px; width:fit-content; }
.td { width:5px; height:5px; background:var(--t3); border-radius:50%; animation:tdot 1.2s infinite; }
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes tdot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
/* INPUT */
.iarea {
  flex-shrink: 0;
  padding: 10px 12px 14px;
  border-top: 1px solid var(--b1);
  background: var(--bg);
  padding-bottom: max(14px, env(safe-area-inset-bottom));
}
.irow { display:flex; gap:8px; align-items:flex-end; }
.iwrap {
  flex: 1;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 16px;
  display: flex;
  align-items: flex-end;
  padding: 6px 8px 6px 14px;
  gap: 6px;
}
.iwrap:focus-within { border-color: rgba(184,224,74,.4); }
textarea.ci {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--t1);
  font-family: "IBM Plex Sans", sans-serif;
  font-size: 15px;
  line-height: 1.5;
  outline: none;
  resize: none;
  max-height: 100px;
  min-height: 22px;
  padding: 4px 0;
}
textarea.ci::placeholder { color:var(--t3); }
.vbtn {
  width:28px; height:28px;
  background:transparent; border:none;
  color:var(--t3); cursor:pointer;
  font-size:16px; flex-shrink:0;
  padding-bottom:2px;
}
.vbtn.rec { color:var(--red); animation:recpulse 1s infinite; }
@keyframes recpulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.sndbtn {
  width:42px; height:42px;
  background:var(--green);
  border:none; border-radius:50%;
  color:#0c0c0b; font-size:20px; font-weight:bold;
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  line-height:1;
}
.sndbtn:disabled { opacity:.3; cursor:not-allowed; }
/* PANEL */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:100;
  align-items:flex-end; justify-content:center;
}
.overlay.open { display:flex; }
.panel {
  background:var(--s1); border:1px solid var(--b2);
  border-radius:20px 20px 0 0;
  padding:20px 18px 32px;
  width:100%; max-width:480px;
  max-height:85vh; overflow-y:auto;
}
.phandle { width:36px; height:4px; background:var(--b2); border-radius:2px; margin:0 auto 18px; }
.ptitle { font-family:"Instrument Serif",serif; font-size:18px; margin-bottom:16px; }
.sg { margin-bottom:14px; }
.sl { display:block; font-family:"IBM Plex Mono",monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--t3); margin-bottom:6px; }
.si {
  width:100%; background:var(--s2); border:1px solid var(--b2);
  color:var(--t1); font-family:"IBM Plex Sans",sans-serif;
  font-size:14px; padding:10px 12px; border-radius:10px; outline:none;
}
.si:focus { border-color:rgba(184,224,74,.4); }
.si[type=password] { letter-spacing:2px; font-family:"IBM Plex Mono",monospace; }
textarea.si { resize:none; height:68px; font-size:13px; line-height:1.5; }
.pbtn {
  width:100%; padding:12px; border-radius:10px;
  font-family:"IBM Plex Mono",monospace; font-size:12px;
  letter-spacing:.5px; cursor:pointer; margin-top:6px;
}
.pbtn.p { background:var(--green); border:none; color:#0c0c0b; font-weight:500; }
.pbtn.g { background:transparent; border:1px solid var(--b2); color:var(--t2); }
.pbtn.d { background:transparent; border:1px solid rgba(224,90,74,.3); color:var(--red); margin-top:16px; opacity:.7; }
.sconf { font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--green); text-align:center; padding:6px; opacity:0; transition:opacity .3s; }
.sconf.show { opacity:1; }
/* NOTICE / TOAST */
.notice {
  background:rgba(224,168,74,.06); border:1px solid rgba(224,168,74,.2);
  border-radius:10px; padding:10px 12px; font-size:12px;
  color:var(--amber); line-height:1.5; cursor:pointer; flex-shrink:0; margin:0 14px 2px;
}
.toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--s2); border:1px solid var(--b2);
  color:var(--t2); font-family:"IBM Plex Mono",monospace;
  font-size:11px; padding:8px 14px; border-radius:20px;
  opacity:0; transition:all .25s; z-index:200;
  pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.errbubble {
  background:rgba(224,90,74,.08); border:1px solid rgba(224,90,74,.2);
  border-radius:10px; padding:10px 12px; font-size:13px; color:var(--red); line-height:1.5;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><div class="dot"></div>Health OS</div>
  <div class="hdr-right">
    <div class="wbadge" id="wb" style="display:none"></div>
    <button class="sbtn" id="settingsBtn">⚙</button>
  </div>
</div>

<div class="qbar">
  <div class="chip" data-q="Trainingsplan für heute">💪 Training</div>
  <div class="chip" data-q="Was soll ich essen?">🍽 Was essen?</div>
  <div class="chip" data-q="Tagesanalyse bitte">📊 Analyse</div>
  <div class="chip" data-q="Bin ich überlastet?">🔋 Recovery</div>
  <div class="chip" data-q="Gewicht heute: " data-focus="1">⚖ Gewicht</div>
  <div class="chip" data-q="Ist das eine gute Wahl? " data-focus="1">✅ Check</div>
</div>

<div class="chat" id="chat"></div>

<div class="iarea">
  <div class="irow">
    <div class="iwrap">
      <textarea class="ci" id="ci" placeholder="Schreib oder sprich…" rows="1"></textarea>
      <button class="vbtn" id="vbtn">🎙</button>
    </div>
    <button class="sndbtn" id="sndbtn">↑</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <div class="phandle"></div>
    <div class="ptitle">Einstellungen</div>
    <div class="sg"><label class="sl">Anthropic API Key</label><input type="password" class="si" id="apiKey" placeholder="sk-ant-api03-…" autocomplete="off"></div>
    <div class="sg"><label class="sl">Dein Name</label><input type="text" class="si" id="uname" placeholder="Mike"></div>
    <div class="sg"><label class="sl">Ziele</label><textarea class="si" id="goals" placeholder="Zielgewicht 64kg. Muskeln definieren. Langfristig gesund."></textarea></div>
    <div class="sg"><label class="sl">Verletzungen / Einschränkungen</label><textarea class="si" id="injuries" placeholder="Schulterprobleme rechts. Rücken & Hüfte steif."></textarea></div>
    <button class="pbtn p" id="saveBtn">Speichern</button>
    <div class="sconf" id="sconf">✓ Gespeichert</div>
    <button class="pbtn g" id="closeBtn">Schließen</button>
    <button class="pbtn d" id="clearBtn">Alle Daten löschen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ── STORAGE ──
const MK = 'hos4_msgs', SK = 'hos4_set', MEK = 'hos4_mem';
const get = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
const set = (k,v) => localStorage.setItem(k, JSON.stringify(v));

let msgs = get(MK) || [];
let cfg  = get(SK)  || {};
let mem  = get(MEK) || {};

// ── DOM REFS ──
const chat    = document.getElementById('chat');
const input   = document.getElementById('ci');
const sndbtn  = document.getElementById('sndbtn');
const vbtn    = document.getElementById('vbtn');
const overlay = document.getElementById('overlay');
const wb      = document.getElementById('wb');

// ── SETTINGS PANEL ──
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('apiKey').value   = cfg.apiKey   || '';
  document.getElementById('uname').value    = cfg.name     || '';
  document.getElementById('goals').value    = cfg.goals    || '';
  document.getElementById('injuries').value = cfg.injuries || '';
  overlay.classList.add('open');
});
document.getElementById('closeBtn').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.getElementById('saveBtn').addEventListener('click', () => {
  cfg.apiKey   = document.getElementById('apiKey').value.trim();
  cfg.name     = document.getElementById('uname').value.trim();
  cfg.goals    = document.getElementById('goals').value.trim();
  cfg.injuries = document.getElementById('injuries').value.trim();
  set(SK, cfg);
  document.getElementById('notice')?.remove();
  const sc = document.getElementById('sconf');
  sc.classList.add('show'); setTimeout(() => sc.classList.remove('show'), 2000);
});
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Alle Nachrichten und Daten löschen?')) return;
  localStorage.removeItem(MK); localStorage.removeItem(MEK);
  msgs = []; mem = {};
  chat.innerHTML = '';
  overlay.classList.remove('open');
  boot();
});

// ── QUICK CHIPS ──
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    input.value = c.dataset.q;
    autoH();
    if (c.dataset.focus) { input.focus(); }
    else { send(); }
  });
});

// ── SEND ──
sndbtn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', autoH);

function autoH() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoH();

  learn(text);
  addMsg('u', text);

  if (!cfg.apiKey) {
    addMsg('a', 'Kein API Key gesetzt. Bitte ⚙ tippen und API Key eintragen.');
    return;
  }

  showTyping();
  sndbtn.disabled = true;

  try {
    const reply = await callAPI(text);
    hideTyping();
    addMsg('a', reply);
  } catch(e) {
    hideTyping();
    const el = document.createElement('div');
    el.className = 'msg a';
    el.innerHTML = `<div class="errbubble">⚠ ${e.message}</div>`;
    chat.appendChild(el);
    scrollBot();
  }

  sndbtn.disabled = false;
}

async function callAPI(text) {
  const history = msgs.slice(-30)
    .filter(m => m.r === 'u' || m.r === 'a')
    .map(m => ({ role: m.r === 'u' ? 'user' : 'assistant', content: m.c }));
  history.push({ role: 'user', content: text });

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': cfg.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: sysPrompt(),
      messages: history
    })
  });

  if (!res.ok) {
    let m = 'HTTP ' + res.status;
    try { const j = await res.json(); m = j.error?.message || m; } catch {}
    if (res.status === 401) m = 'Ungültiger API Key – bitte in ⚙ prüfen.';
    if (res.status === 429) m = 'Rate limit – kurz warten und nochmal.';
    throw new Error(m);
  }
  const data = await res.json();
  return data.content[0].text;
}

// ── SYSTEM PROMPT ──
function sysPrompt() {
  const name     = cfg.name     || 'Mike';
  const goals    = cfg.goals    || 'Zielgewicht 64kg, Muskeln definieren, langfristig gesund';
  const injuries = cfg.injuries || 'Schulterprobleme rechts, Rücken & Hüfte gelegentlich steif';
  const weight   = cfg.lastWeight || '~75kg';
  const today    = new Date().toLocaleDateString('de-DE', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return `Du bist ${name}s persönlicher Health OS Coach. Heute ist ${today}.

PROFIL: ${name} | 38J | 1,68m | ${weight}
Ziele: ${goals}
Einschränkungen: ${injuries}
Training: 3-4x/Woche Kraft+Cardio | Equipment: Gym, Laufband, Hanteln
Philosophie: Sjard Roscher, progressives Overload, Zone 2 Cardio, Longevity
Ernährung: Protein-fokussiert, mag Fisch/Beef/Salate/Asiatisch

STIL: Direkt, konkret, kein Bullshit. Spezifische Gewichte/Wdh/Zeiten nennen. Deutsch, Du-Form. Kurz außer bei Trainingsplänen. Markdown nutzen.${memSummary()}`;
}

// ── MEMORY ──
function dKey(ago) {
  const d = new Date(); d.setDate(d.getDate() - ago);
  return d.toISOString().slice(0,10);
}

function learn(text) {
  const t = text.toLowerCase();
  let ago = 0;
  if (t.includes('gestern')) ago = 1;
  else if (t.includes('vorgestern')) ago = 2;
  else { const m = t.match(/vor (\d) tag/); if (m) ago = parseInt(m[1]); }

  const key = dKey(ago);
  const e = mem[key] || {};

  const wm = text.match(/(\d{2,3}[,.]\d)\s*kg/i) || text.match(/(\d{2,3})\s*kg/i);
  if (wm) {
    const w = parseFloat(wm[1].replace(',','.'));
    if (w > 50 && w < 200) {
      e.weight = w + 'kg';
      if (ago === 0) { cfg.lastWeight = w+'kg'; set(SK, cfg); updateWB(); }
    }
  }
  const sm = text.match(/(\d[\d.]+)\s*schritt/i);
  if (sm) e.steps = sm[1] + ' Schritte';

  const trainKw = ['gym','training','workout','kraft','cardio','laufen','laufband','mobility'];
  if (trainKw.some(k => t.includes(k))) e.training = (e.training||'') + text.slice(0,100) + '; ';

  const foodKw = ['gegessen','frühstück','mittag','abendessen','getrunken','bier','wein','restaurant'];
  if (foodKw.some(k => t.includes(k))) e.food = (e.food||'') + text.slice(0,100) + '; ';

  const sleepM = text.match(/(\d+[,.]?\d*)\s*stunden?\s*(geschlafen|schlaf)/i);
  if (sleepM) e.sleep = sleepM[0];

  const painKw = ['schmerz','wehtut','weh','steif','verletzt','müde'];
  if (painKw.some(k => t.includes(k))) e.note = (e.note||'') + text.slice(0,80) + '; ';

  if (Object.keys(e).length) {
    mem[key] = e;
    // trim to 14 days
    const trimmed = {};
    Object.keys(mem).sort().reverse().slice(0,14).forEach(k => trimmed[k] = mem[k]);
    mem = trimmed;
    set(MEK, mem);
  }
}

function memSummary() {
  const lines = [];
  for (let i = 6; i >= 0; i--) {
    const e = mem[dKey(i)];
    if (!e || !Object.keys(e).length) continue;
    const d = new Date(); d.setDate(d.getDate()-i);
    const lbl = i===0?'Heute':i===1?'Gestern':d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric'});
    const parts = [e.weight,e.sleep,e.steps,e.training&&'Training: '+e.training.slice(0,60),e.food&&'Essen: '+e.food.slice(0,80),e.note&&'⚠ '+e.note.slice(0,50)].filter(Boolean);
    if (parts.length) lines.push(`${lbl}: ${parts.join(' | ')}`);
  }
  return lines.length ? '\n\nGEDÄCHTNIS (7 Tage):\n' + lines.join('\n') : '';
}

// ── RENDER ──
function addMsg(role, content, save=true) {
  const msg = { r: role, c: content, t: new Date().toISOString() };
  if (save) { msgs.push(msg); set(MK, msgs.slice(-200)); }

  // Day separator
  if (msgs.length > 1) {
    const prev = msgs[msgs.length-2];
    if (prev?.t && new Date(prev.t).toDateString() !== new Date(msg.t).toDateString()) {
      addSep(new Date(msg.t));
    }
  }
  chat.appendChild(bubble(msg));
  scrollBot();
}

function addSep(date) {
  const today = new Date(), yest = new Date();
  yest.setDate(yest.getDate()-1);
  const lbl = date.toDateString()===today.toDateString()?'Heute':date.toDateString()===yest.toDateString()?'Gestern':date.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
  const el = document.createElement('div');
  el.className = 'daysep'; el.textContent = lbl;
  chat.appendChild(el);
}

function bubble(msg) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + msg.r;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = md(msg.c);
  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = new Date(msg.t).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  wrap.appendChild(b); wrap.appendChild(ts);
  return wrap;
}

function md(t) {
  if (!t) return '';
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t
    .replace(/^###? (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t = t.replace(/(<li>.*?<\/li>)/gs,'<ul>$1</ul>');
  return t.split(/\n\n+/).map(p => {
    p = p.replace(/\n/g,'<br>');
    if (/^<(h3|ul|hr|li)/.test(p)) return p;
    return '<p>'+p+'</p>';
  }).join('');
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg a'; el.id = 'typing';
  el.innerHTML = '<div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  chat.appendChild(el); scrollBot();
}
function hideTyping() { document.getElementById('typing')?.remove(); }
function scrollBot() { setTimeout(() => chat.scrollTop = chat.scrollHeight, 50); }

function updateWB() {
  if (cfg.lastWeight) { wb.textContent = cfg.lastWeight; wb.style.display = 'block'; }
}

// ── VOICE ──
let rec = null, isRec = false;
vbtn.addEventListener('click', () => {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    toast('Nur in Chrome verfügbar'); return;
  }
  if (isRec) { rec.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR(); rec.lang = 'de-DE';
  rec.onstart = () => { isRec=true; vbtn.classList.add('rec'); vbtn.textContent='⏹'; };
  rec.onresult = e => { input.value = e.results[0][0].transcript; autoH(); };
  rec.onend = () => { isRec=false; vbtn.classList.remove('rec'); vbtn.textContent='🎙'; };
  rec.onerror = () => { isRec=false; vbtn.classList.remove('rec'); vbtn.textContent='🎙'; };
  rec.start();
});

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── BOOT ──
function boot() {
  updateWB();
  if (!msgs.length) {
    const name = cfg.name || 'Mike';
    const today = new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    addMsg('a', `Guten Morgen, ${name}! 👋\n\nHeute ist ${today}. Ich bin dein Health OS Coach.\n\nSchreib einfach was du gegessen hast, was du trainieren willst, oder wie du dich fühlst.\n\n**Beispiele:**\n- _"75,1kg heute Morgen"_\n- _"Heute Gym, 60 Min – Plan bitte"_\n- _"Frühstück: Müsli + Ei – gut?"_\n\nLos geht\'s 💪`);
  } else {
    // Re-render existing messages
    let lastDate = null;
    msgs.forEach(m => {
      const d = m.t ? new Date(m.t).toDateString() : null;
      if (d && d !== lastDate) { addSep(new Date(m.t)); lastDate = d; }
      chat.appendChild(bubble(m));
    });
    scrollBot();
  }

  if (!cfg.apiKey) {
    const n = document.createElement('div');
    n.className = 'notice'; n.id = 'notice';
    n.innerHTML = '⚙ Kein API Key – tippe auf <strong>⚙</strong> oben rechts.';
    n.addEventListener('click', () => document.getElementById('settingsBtn').click());
    chat.insertBefore(n, chat.firstChild);
  }
}


// iOS keyboard: shrink body when keyboard appears
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
    scrollBot();
  });
}

boot();
</script>
</body>
</html>
